databases:
  - name: payflow-db
    plan: free
    databaseName: payflowdb
    user: payflow

services:
  - type: redis
    name: payflow-redis
    plan: free
    ipAllowList: []

  - type: pserv
    name: payflow-worker
    runtime: docker
    dockerfilePath: ./payflow-worker/Dockerfile
    dockerContext: ./payflow-worker
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: payflow-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: payflow-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: payflow-db
          property: password
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          name: payflow-redis
          type: redis
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromService:
          name: payflow-redis
          type: redis
          property: port
      - key: SPRING_DATA_REDIS_PASSWORD
        sync: false
      - key: SPRING_RABBITMQ_HOST
        sync: false
      - key: SPRING_RABBITMQ_PORT
        value: "5671"
      - key: SPRING_RABBITMQ_USERNAME
        sync: false
      - key: SPRING_RABBITMQ_PASSWORD
        sync: false
      - key: SPRING_RABBITMQ_VHOST
        sync: false
      - key: SPRING_RABBITMQ_SSL
        value: "true"
      - key: WORKER_SERVICE_PORT
        value: "8081"

  - type: web
    name: payflow-api
    runtime: docker
    dockerfilePath: ./payflow-api/Dockerfile
    dockerContext: ./payflow-api
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: payflow-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: payflow-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: payflow-db
          property: password
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          name: payflow-redis
          type: redis
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromService:
          name: payflow-redis
          type: redis
          property: port
      - key: SPRING_DATA_REDIS_PASSWORD
        sync: false
      - key: SPRING_RABBITMQ_HOST
        sync: false
      - key: SPRING_RABBITMQ_PORT
        value: "5671"
      - key: SPRING_RABBITMQ_USERNAME
        sync: false
      - key: SPRING_RABBITMQ_PASSWORD
        sync: false
      - key: SPRING_RABBITMQ_VHOST
        sync: false
      - key: SPRING_RABBITMQ_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: API_SERVICE_PORT
        value: "8080"

  - type: web
    name: payflow-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: payflow-frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html