name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payflow-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x mvnw
      - run: ./mvnw -B package

  build-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payflow-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x mvnw
      - run: ./mvnw -B package

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payflow-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build