version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: payflow-postgres
    environment:
      POSTGRES_DB: payflowdb
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-payflow_local_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "payflow", "-d", "payflowdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: payflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  payflow-worker:
    build: ./payflow-worker
    container_name: payflow-worker
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflowdb
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-payflow_local_dev}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  payflow-api:
    build: ./payflow-api
    container_name: payflow-api
    ports:
      - "8090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflowdb
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-payflow_local_dev}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set - generate one with openssl rand -base64 32}"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ALLOWED_ORIGINS: http://localhost:8091,http://localhost:5173
    depends_on:
      payflow-worker:
        condition: service_started
    restart: unless-stopped

  payflow-frontend:
    build:
      context: ./payflow-frontend
      args:
        VITE_API_BASE_URL: http://localhost:8090/api
    container_name: payflow-frontend
    ports:
      - "8091:80"
    depends_on:
      - payflow-api
    restart: unless-stopped

  # ── Observability (Phase 6) ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: payflow-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: payflow-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus

volumes:
  postgres-data:
