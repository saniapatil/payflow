global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'payflow-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payflow-api:8080']

  - job_name: 'payflow-worker'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payflow-worker:8081']
